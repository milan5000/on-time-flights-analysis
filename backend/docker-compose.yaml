services:
  api:
    build: .
    image: computationalconnor/final-project-api:prod  # add this for tagging
    container_name: final-project-api-test               # no colon, use hyphens
    ports:
      - "8000:8000"
    depends_on:
      - redis-db
    environment:
      - LOG_LEVEL=INFO

  redis-db:
    image: redis:7
    container_name: final-project-redis-test
    ports:
      - "6379:6379"

  worker:
    build: .
    image: computationalconnor/final-project-worker:prod  # add this for tagging
    container_name: final-project-worker-test
    command: uv run worker.py
    depends_on:
      - redis-db
    environment:
      - LOG_LEVEL=INFO